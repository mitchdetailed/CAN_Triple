; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:CAN_Triple]
platform = ststm32
platform_packages = framework-stm32cubeg4 @ 1.6.1
board = CAN_Triple
framework = stm32cube
build_flags =  -Wl,-u,_printf_float, -Wl,-u,_scanf_float ; Required for printing timestamps...

upload_protocol = stlink
debug_tool = stlink
debug_speed = 24000
; STLINK-V3 debug/upload: recent OpenOCD dropped the legacy hla_swd transport,
; so use the DAP interface + dapdirect_swd. The post-script fixes the upload
; command; debug_server below fixes interactive debugging (pio debug).
debug_server =
    $PACKAGE_DIR/bin/openocd
    -s $PACKAGE_DIR/openocd/scripts
    -f interface/stlink-dap.cfg
    -c
    transport select dapdirect_swd
    -f target/stm32g4x.cfg


; `pio check` config. The suppressions file documents why each silenced check
; is an analyser limitation rather than a defect.
; NOTE: setting check_flags drops PlatformIO's default --inline-suppr, so it has
; to be repeated here or every `// cppcheck-suppress` comment stops working.
check_tool = cppcheck
check_flags =
    cppcheck: --inline-suppr --suppressions-list=cppcheck-suppressions.txt

monitor_speed = 7372800
monitor_filters = log2file ; This exports message information into the Directory\logs\device-monitor-{YYMMDD-HHMMSS}.log
;monitor_filters = hexlify  ; This sends message information to serial terminal in hexidecimal output
extra_scripts = pre:scripts/build_flags.py
